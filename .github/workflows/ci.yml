name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-racer-cluster
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-racer-cluster

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-racer-cluster
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-racer-cluster/Cargo.lock', 'embedded/sigma-racer-cluster/Cargo.toml', 'embedded/sigma-racer-cluster/rust-toolchain.toml', 'embedded/sigma-racer-cluster/.cargo/config.toml') }}

      - name: Host tests
        run: cargo test

      - name: Host clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Release build
        run: cargo build --release

  can-socket:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-racer-cluster
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-racer-cluster

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@1.97.1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-racer-cluster
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-racer-cluster/Cargo.lock', 'embedded/sigma-racer-cluster/Cargo.toml', 'embedded/sigma-racer-cluster/rust-toolchain.toml', 'embedded/sigma-racer-cluster/.cargo/config.toml') }}

      - name: Build with SocketCAN
        run: cargo build --release --features can-socket

  fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-racer-cluster
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-racer-cluster
      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation
      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
